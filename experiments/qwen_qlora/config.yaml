seed: 42

model:
  name_or_path: models/Qwen2.5-1.5B-Instruct
  max_length: 1024
  trust_remote_code: true

data:
  source_files:
    - data/hr_questions.txt
    - data/tech_knowledge.txt
  extra_jsonl: experiments/qwen_qlora/data/raw/interview_qa.jsonl
  output_dir: experiments/qwen_qlora/data/processed
  target_size: 1200
  train_ratio: 0.8
  validation_ratio: 0.1
  test_ratio: 0.1

qlora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: experiments/qwen_qlora/outputs/qwen2.5-1.5b-qlora
  learning_rate: 0.0002
  epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  gradient_checkpointing: true
  bf16: true
  fp16: false

evaluation:
  max_new_tokens: 384
  temperature: 0.0
  top_p: 0.9
  max_samples: 120
  output_dir: experiments/qwen_qlora/results
